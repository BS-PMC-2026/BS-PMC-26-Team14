<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - CityFix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 28%, rgba(196, 124, 255, 0.40), transparent 36%),
        radial-gradient(circle at 86% 18%, rgba(255, 255, 255, 0.95), transparent 34%),
        linear-gradient(135deg, #efd8ff 0%, #fff7f2 48%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      min-height: 470px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      box-shadow: 0 26px 50px rgba(15, 23, 42, 0.18);
      padding: 34px 40px 34px;
      border: 1px solid rgba(229, 231, 235, 0.9);
      position: relative;
    }

    .back-square {
      width: 31px;
      height: 31px;
      border-radius: 8px;
      background: linear-gradient(135deg, #a855f7, #8b00ff);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(139, 0, 255, 0.25);
      position: absolute;
      top: 31px;
      left: 32px;
    }

    .back-square svg {
      width: 17px;
      height: 17px;
      stroke: white;
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .top-icon {
      width: 38px;
      height: 38px;
      margin: 24px auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .top-icon svg {
      width: 35px;
      height: 35px;
      stroke: #9b00ff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
      letter-spacing: -0.4px;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 17px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 40px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      padding: 0 13px 0 38px;
      font-size: 12px;
      color: #111827;
      outline: none;
      transition: 0.2s ease;
    }

    .input-wrap input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.13);
    }

    .input-wrap input::placeholder {
      color: #8f98a7;
    }

    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      stroke: #94a3b8;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 7px 0 32px;
      gap: 8px;
    }

    .forgot-link {
      color: #8b00ff;
      text-decoration: underline;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #374151;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .remember input {
      width: 13px;
      height: 13px;
      accent-color: #a855f7;
      cursor: pointer;
    }

    .submit-area {
      display: flex;
      justify-content: center;
    }

    .submit-btn {
      width: 92px;
      height: 36px;
      border: none;
      border-radius: 7px;
      background: linear-gradient(90deg, #a855f7 0%, #8b00ff 100%);
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 9px 17px rgba(139, 0, 255, 0.30);
      transition: 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 11px 20px rgba(139, 0, 255, 0.35);
    }

    .message-box {
      display: none;
      margin-top: 15px;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      text-align: center;
      line-height: 1.5;
    }

    .message-box.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .message-box.success {
      display: block;
      background: #faf5ff;
      color: #7e22ce;
      border: 1px solid #e9d5ff;
    }

    @media (max-width: 600px) {
      body {
        padding: 18px;
      }

      .card {
        max-width: 360px;
        min-height: 450px;
        padding: 32px 28px 30px;
      }

      .back-square {
        top: 28px;
        left: 28px;
      }

      .title {
        font-size: 24px;
      }

      .subtitle {
        font-size: 11px;
      }

      .input-wrap input {
        height: 38px;
      }
    }
  
    .input-wrap.password-wrap input {
      padding-right: 44px;
    }

    .password-simple-wrap {
      position: relative;
    }

    .password-simple-wrap input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: #faf5ff;
      color: #8b00ff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s ease;
      z-index: 3;
    }

    .password-toggle:hover {
      background: #8b00ff;
      color: #ffffff;
      box-shadow: 0 6px 14px rgba(168, 85, 247, 0.13);
    }

    .password-toggle svg {
      position: static !important;
      left: auto !important;
      top: auto !important;
      transform: none !important;
      width: 15px !important;
      height: 15px !important;
      stroke: currentColor !important;
      fill: none !important;
      stroke-width: 2 !important;
      stroke-linecap: round !important;
      stroke-linejoin: round !important;
      pointer-events: none !important;
    }

  </style>
</head>

<body>
  <div class="card">

    <button class="back-square" type="button" onclick="window.location.href='login.html'">
      <svg viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6"></path>
      </svg>
    </button>

    <div class="top-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 3l7 3v6c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6l7-3z"></path>
        <path d="M9.5 12.5l1.7 1.7 3.3-3.7"></path>
      </svg>
    </div>

    <h1 class="title">Admin Login</h1>
    <p class="subtitle">Access the system management panel</p>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="admin@cityfix.com" required />
          <svg viewBox="0 0 24 24">
            <path d="M4 6h16v12H4z"></path>
            <path d="m4 7 8 6 8-6"></path>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap password-wrap">
          <input type="password" id="password" placeholder="••••••••" required />
          <svg viewBox="0 0 24 24">
            <rect x="5" y="11" width="14" height="10" rx="2"></rect>
            <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
          </svg>
        
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
                <svg class="eye-open" viewBox="0 0 24 24">
                  <path d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-off" viewBox="0 0 24 24" style="display:none">
                  <path d="M17.94 17.94A10.8 10.8 0 0 1 12 19C5.5 19 1.5 12 1.5 12a19.1 19.1 0 0 1 5.06-5.94"></path>
                  <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42"></path>
                  <path d="M9.9 4.24A10.7 10.7 0 0 1 12 4.99c6.5 0 10.5 7 10.5 7a19.4 19.4 0 0 1-2.44 3.27"></path>
                  <path d="M3 3l18 18"></path>
                </svg>
              </button>
            </div>
      </div>

      <div class="options-row">
        <a href="forgot-password.html?return=admin-login.html" class="forgot-link">Forgot password</a>

        <label class="remember">
          <input type="checkbox" id="rememberMe" />
          <span>Remember me</span>
        </label>
      </div>

      <div class="submit-area">
        <button type="submit" class="submit-btn">Login</button>
      </div>

      <div id="messageBox" class="message-box"></div>
    </form>
  </div>

  <script>

    function togglePasswordVisibility(button) {
      const wrapper =
        button.closest(".input-wrap") ||
        button.closest(".password-simple-wrap");

      if (!wrapper) return;

      const input = wrapper.querySelector("input");
      if (!input) return;

      const shouldShow = input.type === "password";
      input.type = shouldShow ? "text" : "password";

      const eyeOpen = button.querySelector(".eye-open");
      const eyeOff = button.querySelector(".eye-off");

      if (eyeOpen && eyeOff) {
        eyeOpen.style.display = shouldShow ? "none" : "block";
        eyeOff.style.display = shouldShow ? "block" : "none";
      }

      button.setAttribute(
        "aria-label",
        shouldShow ? "Hide password" : "Show password"
      );
    }

    const form = document.getElementById("adminLoginForm");
    const messageBox = document.getElementById("messageBox");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      messageBox.style.display = "none";
      messageBox.className = "message-box";
      messageBox.textContent = "";

      const data = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
      };

      console.log("Sending admin login", data);

      try {
        const response = await fetch("/api/Auth/login-admin", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        let result = {};
        try {
          result = await response.json();
        } catch {
          result = {};
        }

        console.log("status:", response.status);
        console.log("result:", result);

        if (!response.ok) {
          messageBox.style.display = "block";
          messageBox.className = "message-box error";
          messageBox.textContent = result.message || "Login error";
          return;
        }

        if (document.getElementById("rememberMe").checked) {
          localStorage.setItem("adminEmail", data.email);
        } else {
          localStorage.removeItem("adminEmail");
        }

        localStorage.setItem("userRole", "Admin");
        localStorage.setItem("userName", result.fullName || "");
        localStorage.setItem("userEmail", data.email);

        messageBox.style.display = "block";
        messageBox.className = "message-box success";
        messageBox.textContent = result.message || "Logged in successfully";

        setTimeout(() => {
          window.location.href = "home.html";
        }, 1000);

      } catch (error) {
        messageBox.style.display = "block";
        messageBox.className = "message-box error";
        messageBox.textContent = "Connection error with server";
        console.error("login-admin error:", error);
      }
    });

    const savedEmail = localStorage.getItem("adminEmail");

    if (savedEmail) {
      document.getElementById("email").value = savedEmail;
      document.getElementById("rememberMe").checked = true;
    }
  </script>
</body>
</html>
