<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שחזור סיסמה - CityFix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      background: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 500px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
      padding: 30px;
    }
    .title { text-align: center; font-size: 30px; font-weight: 800; color: #1e3a8a; }
    .subtitle { text-align: center; font-size: 16px; color: #475569; margin: 8px 0 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    input {
      width: 100%;
      height: 50px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 16px;
      outline: none;
    }
    .btn {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.7; cursor: wait; }
    .message-box {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      text-align: center;
      line-height: 1.5;
    }
    .message-box.error { display: block; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .message-box.success { display: block; background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .links {
      margin-top: 18px;
      text-align: center;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .links a { color: #334155; text-decoration: none; font-weight: 600; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">שכחתי סיסמה</h1>
    <p class="subtitle">הזן אימייל וקבל קוד אימות לאיפוס סיסמה</p>

    <form id="forgotPasswordForm">
      <div class="form-group">
        <label for="email">אימייל</label>
        <input id="email" type="email" placeholder="name@example.com" required />
      </div>

      <button id="submitBtn" class="btn" type="submit">שלח קוד אימות</button>
      <div id="messageBox" class="message-box"></div>
    </form>

    <div class="links">
      <a id="backToLoginLink" href="login.html">חזרה להתחברות</a>
      <a href="reset-password.html">כבר יש לי קוד</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get("return") || "login.html";

    const form = document.getElementById("forgotPasswordForm");
    const emailInput = document.getElementById("email");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");
    const backToLoginLink = document.getElementById("backToLoginLink");

    backToLoginLink.href = returnTo;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      messageBox.className = "message-box";
      messageBox.style.display = "none";
      messageBox.textContent = "";
      submitBtn.disabled = true;

      try {
        const response = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email })
        });

        let result = {};
        try {
          result = await response.json();
        } catch {
          result = {};
        }

        if (!response.ok) {
          messageBox.className = "message-box error";
          messageBox.textContent = result.message || "שליחת הקוד נכשלה";
          return;
        }

        messageBox.className = "message-box success";
        messageBox.textContent = result.message || "אם הכתובת קיימת, נשלח קוד לאימייל";

        const target = "reset-password.html?email=" + encodeURIComponent(email) + "&return=" + encodeURIComponent(returnTo);
        setTimeout(() => {
          window.location.href = target;
        }, 1200);
      } catch {
        messageBox.className = "message-box error";
        messageBox.textContent = "בעיה בחיבור לשרת";
      } finally {
        messageBox.style.display = "block";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
