<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דף ראשי - CityFix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 100%);
      min-height: 100vh;
      color: #0f172a;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      width: 100%;
      background: #ffffff;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-box {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2563eb;
      font-size: 24px;
      font-weight: 800;
    }

    .brand h1 {
      font-size: 28px;
      color: #2563eb;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .profile-btn {
      background: #2563eb;
      color: white;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .profile-btn.hidden {
      display: none;
    }

    .profile-btn:hover {
      background: #1d4ed8;
    }

    .logout-btn {
      background: #e2e8f0;
      color: #1e293b;
    }

    .logout-btn:hover {
      background: #cbd5e1;
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 16px;
    }

    .card {
      width: 100%;
      max-width: 820px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.10);
      padding: 42px 32px;
      text-align: center;
    }

    .welcome-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .title {
      font-size: 36px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 19px;
      color: #475569;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 18px;
    }

    .info-box {
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 20px 16px;
    }

    .info-label {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .info-value {
      font-size: 18px;
      color: #0f172a;
      font-weight: 800;
      word-break: break-word;
    }

    .admin-section {
      display: none;
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #e5e7eb;
    }

    .admin-title {
      font-size: 20px;
      font-weight: 800;
      color: #8b2cf5;
      margin-bottom: 14px;
    }

    .approve-btn {
      background: #8b2cf5;
      color: white;
      box-shadow: 0 8px 18px rgba(139, 44, 245, 0.22);
    }

    .approve-btn:hover {
      background: #7c1fc9;
    }

    @media (max-width: 760px) {
      .topbar {
        padding: 16px;
      }

      .brand h1 {
        font-size: 24px;
      }

      .card {
        padding: 28px 18px;
      }

      .title {
        font-size: 28px;
      }

      .subtitle {
        font-size: 16px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .top-actions {
        width: 100%;
      }

      .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-box">C</div>
        <h1>CityFix</h1>
      </div>

      <div class="top-actions">
        <button class="btn profile-btn" onclick="goToProfile()">Profile</button>
        <button class="btn logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="main">
      <div class="card">
        <div class="welcome-icon">👋</div>
        <h2 class="title" id="welcomeTitle">ברוך הבא</h2>
        <p class="subtitle">
          התחברת בהצלחה למערכת CityFix.
          מכאן תוכל להמשיך לפרופיל שלך, להתנתק, ובהמשך גם לראות פעולות ודיווחים.
        </p>

        <div class="info-grid">
          <div class="info-box">
            <div class="info-label">שם משתמש</div>
            <div class="info-value" id="userName">-</div>
          </div>

          <div class="info-box">
            <div class="info-label">אימייל</div>
            <div class="info-value" id="userEmail">-</div>
          </div>

          <div class="info-box">
            <div class="info-label">סוג משתמש</div>
            <div class="info-value" id="userRole">-</div>
          </div>
        </div>

        <div class="admin-section" id="adminSection">
          <h3 class="admin-title">ניהול המערכת</h3>
          <button class="btn approve-btn" onclick="goToApproveWorkers()">אישור בקשות עובדים</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const userName = localStorage.getItem("userName") || "משתמש";
    const userEmail = localStorage.getItem("userEmail") || "-";
    const userRole = localStorage.getItem("userRole") || "-";

    if (userRole === "-" || !localStorage.getItem("userEmail")) {
      window.location.href = "login.html";
    }

    document.getElementById("welcomeTitle").textContent = `ברוך הבא, ${userName}`;
    document.getElementById("userName").textContent = userName;
    document.getElementById("userEmail").textContent = userEmail;
    document.getElementById("userRole").textContent = userRole;

    if (userRole === "Admin") {
      document.getElementById("adminSection").style.display = "block";
    } else {
      document.querySelector(".profile-btn").classList.add("hidden");
    }

    function goToProfile() {
      if (userRole !== "Admin") {
        return;
      }

      window.location.href = "profile.html";
    }

    function goToApproveWorkers() {
      window.location.href = "approve-workers.html";
    }

    function logout() {
      localStorage.removeItem("userRole");
      localStorage.removeItem("userName");
      localStorage.removeItem("userEmail");
      window.location.href = "login.html";
    }

  </script>
</body>
</html>
