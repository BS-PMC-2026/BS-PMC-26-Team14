<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CityFix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

body {
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
      background:
        radial-gradient(circle at 0% 100%, rgba(145, 155, 255, 0.50), transparent 38%),
        radial-gradient(circle at 100% 100%, rgba(165, 175, 255, 0.42), transparent 36%),
        radial-gradient(circle at 68% 0%, rgba(255, 250, 235, 0.95), transparent 45%),
        linear-gradient(135deg, #f0efff 0%, #ffffff 48%, #eef0ff 100%);}

    .container {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      padding: 50px 50px 44px;
      width: 100%;
      max-width: 860px;
      position: relative;
    }

    .back-btn {
      position: absolute;
      top: 22px;
      left: 22px;
      width: 38px;
      height: 38px;
      background: #3b4fd8;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      border: none;
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
      stroke: white;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 17px;
      color: #64748b;
      margin-bottom: 38px;
    }

    .cards {
      display: flex;
      gap: 18px;
      justify-content: center;
    }

    .card {
      flex: 1;
      background: #f8f9ff;
      border: 1px solid #e8eaf0;
      border-radius: 16px;
      padding: 36px 24px 28px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.10);
    }

    .icon-wrap {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap svg {
      width: 34px;
      height: 34px;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card h2 {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      font-family: 'Heebo', sans-serif;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.88;
    }

    /* Admin - purple */
    .admin .icon-wrap { background: #f3eaff; }
    .admin .icon-wrap svg { stroke: #8b2cf5; }
    .admin .btn { background: #8b2cf5; }

    /* Citizen - blue */
    .customer .icon-wrap { background: #e8f0ff; }
    .customer .icon-wrap svg { stroke: #2563eb; }
    .customer .btn { background: #2563eb; }

    /* Worker - green */
    .worker .icon-wrap { background: #e6f9f0; }
    .worker .icon-wrap svg { stroke: #16a34a; }
    .worker .btn { background: #16a34a; }

    @media (max-width: 700px) {
      .cards { flex-direction: column; }
      .container { padding: 40px 20px 32px; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <div class="container">

    <a class="back-btn" href="../index.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </a>

    <h1>Login</h1>
    <p class="subtitle">Choose your user type</p>

    <div class="cards">

      <div class="card admin" onclick="goToAdminLogin()">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M12 3l7 3v6c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6l7-3z"></path>
            <path d="M9.5 12.5l1.7 1.7 3.3-3.7"></path>
          </svg>
        </div>
        <h2>Admin</h2>
        <p>System management</p>
        <button class="btn" onclick="goToAdminLogin()">Continue</button>
      </div>

      <div class="card customer" onclick="goToCustomerLogin()">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path>
            <path d="M5 20v-1a7 7 0 0 1 14 0v1"></path>
          </svg>
        </div>
        <h2>Citizen</h2>
        <p>Report city issues</p>
        <button class="btn" onclick="goToCustomerLogin()">Continue</button>
      </div>

      <div class="card worker" onclick="goToWorkerLogin()">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="7" width="18" height="12" rx="2"></rect>
            <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </div>
        <h2>Worker</h2>
        <p>Handle reports and tasks</p>
        <button class="btn" onclick="goToWorkerLogin()">Continue</button>
      </div>

    </div>
  </div>

  <script>
    function goToAdminLogin() { window.location.href = "admin-login.html"; }
    function goToCustomerLogin() { window.location.href = "customer-login.html"; }
    function goToWorkerLogin() { window.location.href = "worker-login.html"; }
  </script>
</body>
</html>
