<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>התחברות למערכת - CityFix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: #eef2ff;
      min-height: 100vh;
      color: #0f172a;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .title {
      font-size: 46px;
      font-weight: 800;
      color: #2f3b8f;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      font-size: 20px;
      color: #64748b;
      margin-bottom: 42px;
      text-align: center;
    }

    .cards {
      width: 100%;
      max-width: 1080px;
      display: flex;
      justify-content: center;
      gap: 22px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }

    .card {
      width: 290px;
      min-height: 250px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
      padding: 28px 24px 24px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 1px solid transparent;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.14);
    }

    .icon-circle {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-circle svg {
      width: 46px;
      height: 46px;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .card p {
      font-size: 17px;
      color: #475569;
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .login-link {
      font-size: 22px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .admin .icon-circle {
      background: #efe3ff;
    }

    .admin .icon-circle svg {
      stroke: #8b2cf5;
    }

    .admin .login-link {
      color: #8b2cf5;
    }

    .customer .icon-circle {
      background: #dbeafe;
    }

    .customer .icon-circle svg {
      stroke: #2563eb;
    }

    .customer .login-link {
      color: #2563eb;
    }

    .worker .icon-circle {
      background: #d1fae5;
    }

    .worker .icon-circle svg {
      stroke: #16a34a;
    }

    .worker .login-link {
      color: #16a34a;
    }

    .back-link {
      margin-top: 8px;
      color: #475569;
      text-decoration: none;
      font-size: 18px;
    }

    .back-link:hover,
    .login-link:hover {
      opacity: 0.85;
    }

    @media (max-width: 980px) {
      .title {
        font-size: 38px;
      }

      .subtitle {
        font-size: 18px;
      }
    }

    @media (max-width: 768px) {
      .page {
        justify-content: flex-start;
        padding-top: 70px;
      }

      .title {
        font-size: 32px;
      }

      .subtitle {
        margin-bottom: 28px;
      }

      .card {
        width: 100%;
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="title">התחברות למערכת</h1>
    <p class="subtitle">בחר את סוג המשתמש שלך</p>

    <div class="cards">
      <div class="card admin" onclick="goToAdminLogin()">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24">
            <path d="M12 3l7 3v6c0 5-3.5 8-7 9-3.5-1-7-4-7-9V6l7-3z"></path>
            <path d="M9.5 12.5l1.7 1.7 3.3-3.7"></path>
          </svg>
        </div>
        <h2>מנהל</h2>
        <p>ניהול המערכת והפעילויות</p>
        <a class="login-link" href="admin-login.html">כניסה ←</a>
      </div>

      <div class="card customer" onclick="goToCustomerLogin()">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path>
            <path d="M5 20v-1a7 7 0 0 1 14 0v1"></path>
          </svg>
        </div>
        <h2>תושב</h2>
        <p>דיווח על בעיות עירוניות</p>
        <a class="login-link" href="customer-login.html">כניסה ←</a>
      </div>

      <div class="card worker" onclick="goToWorkerLogin()">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="7" width="18" height="12" rx="2"></rect>
            <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </div>
        <h2>עובד</h2>
        <p>טיפול בדיווחים ומשימות</p>
        <a class="login-link" href="worker-login.html">כניסה ←</a>
      </div>
    </div>

    <a class="back-link" href="../index.html">← חזרה לדף הבית</a>
  </div>

  <script>
    function goToAdminLogin() {
      window.location.href = "admin-login.html";
    }

    function goToCustomerLogin() {
      window.location.href = "customer-login.html";
    }

    function goToWorkerLogin() {
      window.location.href = "worker-login.html";
    }
  </script>
</body>
</html>
