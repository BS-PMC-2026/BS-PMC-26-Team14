<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - CityFix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      background: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
      padding: 30px;
    }
    .title { text-align: center; font-size: 30px; font-weight: 800; color: #1e3a8a; }
    .subtitle { text-align: center; font-size: 16px; color: #475569; margin: 8px 0 24px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    input {
      width: 100%;
      height: 50px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 16px;
      outline: none;
    }
    .btn {
      width: 100%;
      height: 50px;
      margin-top: 6px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.7; cursor: wait; }
    .message-box {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      text-align: center;
      line-height: 1.5;
    }
    .message-box.error { display: block; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .message-box.success { display: block; background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .links {
      margin-top: 18px;
      text-align: center;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .links a { color: #334155; text-decoration: none; font-weight: 600; }
    .links a:hover { text-decoration: underline; }
  
    .input-wrap.password-wrap input {
      padding-right: 44px;
    }

    .password-simple-wrap {
      position: relative;
    }

    .password-simple-wrap input {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: #eff6ff;
      color: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s ease;
      z-index: 3;
    }

    .password-toggle:hover {
      background: #2563eb;
      color: #ffffff;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.13);
    }

    .password-toggle svg {
      position: static !important;
      left: auto !important;
      top: auto !important;
      transform: none !important;
      width: 15px !important;
      height: 15px !important;
      stroke: currentColor !important;
      fill: none !important;
      stroke-width: 2 !important;
      stroke-linecap: round !important;
      stroke-linejoin: round !important;
      pointer-events: none !important;
    }

  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Reset Password</h1>
    <p class="subtitle">Enter the code you received by email and choose a new password</p>

    <form id="resetPasswordForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="name@example.com" required />
      </div>

      <div class="form-group">
        <label for="code">Verification Code (6 digits)</label>
        <input id="code" type="text" inputmode="numeric" maxlength="6" placeholder="123456" required />
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="password-simple-wrap">
          <input id="newPassword" type="password" minlength="6" placeholder="At least 6 characters" required />
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
          <svg class="eye-open" viewBox="0 0 24 24">
            <path d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="eye-off" viewBox="0 0 24 24" style="display:none">
            <path d="M17.94 17.94A10.8 10.8 0 0 1 12 19C5.5 19 1.5 12 1.5 12a19.1 19.1 0 0 1 5.06-5.94"></path>
            <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42"></path>
            <path d="M9.9 4.24A10.7 10.7 0 0 1 12 4.99c6.5 0 10.5 7 10.5 7a19.4 19.4 0 0 1-2.44 3.27"></path>
            <path d="M3 3l18 18"></path>
          </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-simple-wrap">
          <input id="confirmPassword" type="password" minlength="6" placeholder="Re-enter password" required />
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
          <svg class="eye-open" viewBox="0 0 24 24">
            <path d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="eye-off" viewBox="0 0 24 24" style="display:none">
            <path d="M17.94 17.94A10.8 10.8 0 0 1 12 19C5.5 19 1.5 12 1.5 12a19.1 19.1 0 0 1 5.06-5.94"></path>
            <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42"></path>
            <path d="M9.9 4.24A10.7 10.7 0 0 1 12 4.99c6.5 0 10.5 7 10.5 7a19.4 19.4 0 0 1-2.44 3.27"></path>
            <path d="M3 3l18 18"></path>
          </svg>
          </button>
        </div>
      </div>

      <button id="submitBtn" class="btn" type="submit">Reset Password</button>
      <div id="messageBox" class="message-box"></div>
    </form>

    <div class="links">
      <a id="backToLoginLink" href="login.html">Back to Login</a>
      <a id="backToForgotLink" href="forgot-password.html">Send new code</a>
    </div>
  </div>

  <script>

    function togglePasswordVisibility(button) {
      const wrapper =
        button.closest(".input-wrap") ||
        button.closest(".password-simple-wrap");

      if (!wrapper) return;

      const input = wrapper.querySelector("input");
      if (!input) return;

      const shouldShow = input.type === "password";
      input.type = shouldShow ? "text" : "password";

      const eyeOpen = button.querySelector(".eye-open");
      const eyeOff = button.querySelector(".eye-off");

      if (eyeOpen && eyeOff) {
        eyeOpen.style.display = shouldShow ? "none" : "block";
        eyeOff.style.display = shouldShow ? "block" : "none";
      }

      button.setAttribute(
        "aria-label",
        shouldShow ? "Hide password" : "Show password"
      );
    }

    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get("return") || "login.html";
    const emailFromQuery = params.get("email") || "";

    const form = document.getElementById("resetPasswordForm");
    const emailInput = document.getElementById("email");
    const codeInput = document.getElementById("code");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");
    const backToLoginLink = document.getElementById("backToLoginLink");
    const backToForgotLink = document.getElementById("backToForgotLink");

    backToLoginLink.href = returnTo;
    backToForgotLink.href = "forgot-password.html?return=" + encodeURIComponent(returnTo);

    if (emailFromQuery) {
      emailInput.value = emailFromQuery;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const code = codeInput.value.trim();
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      messageBox.className = "message-box";
      messageBox.style.display = "none";
      messageBox.textContent = "";

      if (!/^\d{6}$/.test(code)) {
        messageBox.className = "message-box error";
        messageBox.style.display = "block";
        messageBox.textContent = "The verification code must contain 6 digits";
        return;
      }

      if (newPassword.length < 6) {
        messageBox.className = "message-box error";
        messageBox.style.display = "block";
        messageBox.textContent = "Password must be at least 6 characters";
        return;
      }

      if (newPassword !== confirmPassword) {
        messageBox.className = "message-box error";
        messageBox.style.display = "block";
        messageBox.textContent = "Passwords do not match";
        return;
      }

      submitBtn.disabled = true;

      try {
        const response = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, code: code, newPassword: newPassword })
        });

        let result = {};
        try {
          result = await response.json();
        } catch {
          result = {};
        }

        if (!response.ok) {
          messageBox.className = "message-box error";
          messageBox.textContent = result.message || "Password reset failed";
          return;
        }

        messageBox.className = "message-box success";
        messageBox.textContent = result.message || "Password reset successfully";

        setTimeout(() => {
          window.location.href = returnTo;
        }, 1200);
      } catch {
        messageBox.className = "message-box error";
        messageBox.textContent = "Connection error with server";
      } finally {
        messageBox.style.display = "block";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
