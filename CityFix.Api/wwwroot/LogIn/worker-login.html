<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worker Login - CityFix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 246, 235, 0.95), transparent 35%),
        radial-gradient(circle at 78% 35%, rgba(150, 235, 195, 0.55), transparent 42%),
        linear-gradient(135deg, #fff8ed 0%, #eefcf4 45%, #d9f8e8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      min-height: 470px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      box-shadow: 0 26px 50px rgba(15, 23, 42, 0.18);
      padding: 34px 40px 34px;
      border: 1px solid rgba(229, 231, 235, 0.9);
      position: relative;
    }

    .back-square {
      width: 31px;
      height: 31px;
      border-radius: 8px;
      background: linear-gradient(135deg, #16a34a, #00a344);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(22, 163, 74, 0.25);
      position: absolute;
      top: 31px;
      left: 32px;
    }

    .back-square svg {
      width: 17px;
      height: 17px;
      stroke: white;
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .top-icon {
      width: 38px;
      height: 38px;
      margin: 24px auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .top-icon svg {
      width: 35px;
      height: 35px;
      stroke: #00a344;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
      letter-spacing: -0.4px;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 17px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 40px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      padding: 0 13px 0 38px;
      font-size: 12px;
      color: #111827;
      outline: none;
      transition: 0.2s ease;
    }

    .input-wrap input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.13);
    }

    .input-wrap input::placeholder {
      color: #8f98a7;
    }

    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      stroke: #94a3b8;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 7px 0 32px;
      gap: 8px;
    }

    .forgot-link {
      color: #00a344;
      text-decoration: underline;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #374151;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .remember input {
      width: 13px;
      height: 13px;
      accent-color: #16a34a;
      cursor: pointer;
    }

    .submit-area {
      display: flex;
      justify-content: center;
    }

    .submit-btn {
      width: 92px;
      height: 36px;
      border: none;
      border-radius: 7px;
      background: linear-gradient(90deg, #16a34a 0%, #00a344 100%);
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 9px 17px rgba(22, 163, 74, 0.30);
      transition: 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 11px 20px rgba(22, 163, 74, 0.35);
      background: linear-gradient(90deg, #15803d 0%, #00963e 100%);
    }

    .message-box {
      display: none;
      margin-top: 15px;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      text-align: center;
      line-height: 1.5;
    }

    .message-box.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .message-box.success {
      display: block;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .bottom-links {
      text-align: center;
      margin-top: 18px;
      line-height: 1.8;
      font-size: 12px;
      color: #6b7280;
    }

    .bottom-links a {
      text-decoration: none;
      font-weight: 700;
    }

    .signup-link {
      color: #16a34a;
    }

    .back-link {
      color: #334155;
      font-weight: 500;
    }

    .signup-link:hover,
    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      body {
        padding: 18px;
      }

      .card {
        max-width: 360px;
        min-height: 450px;
        padding: 32px 28px 30px;
      }

      .back-square {
        top: 28px;
        left: 28px;
      }

      .title {
        font-size: 24px;
      }

      .subtitle {
        font-size: 11px;
      }

      .input-wrap input {
        height: 38px;
      }

      .options-row {
        gap: 10px;
      }

      .forgot-link,
      .remember {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="card">

    <button class="back-square" type="button" onclick="window.location.href='login.html'">
      <svg viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6"></path>
      </svg>
    </button>

    <div class="top-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="7" width="18" height="12" rx="2"></rect>
        <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </div>

    <h1 class="title">Worker Login</h1>
    <p class="subtitle">Handle reports and tasks</p>

    <form id="workerLoginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="worker@cityfix.com" required />
          <svg viewBox="0 0 24 24">
            <path d="M4 6h16v12H4z"></path>
            <path d="m4 7 8 6 8-6"></path>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" required />
          <svg viewBox="0 0 24 24">
            <rect x="5" y="11" width="14" height="10" rx="2"></rect>
            <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
          </svg>
        </div>
      </div>

      <div class="options-row">
        <a href="forgot-password.html?return=worker-login.html" class="forgot-link">Forgot password</a>

        <label class="remember">
          <input type="checkbox" id="rememberMe" />
          <span>Remember me</span>
        </label>
      </div>

      <div class="submit-area">
        <button type="submit" class="submit-btn">Login</button>
      </div>

      <div id="messageBox" class="message-box"></div>
    </form>

    <div class="bottom-links">
      <div>Not registered yet? <a class="signup-link" href="../signUp/worker-signup.html">Sign Up Now</a></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("workerLoginForm");
    const messageBox = document.getElementById("messageBox");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      messageBox.className = "message-box";
      messageBox.style.display = "none";
      messageBox.textContent = "";

      const data = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
      };

      try {
        const response = await fetch("/api/Auth/login-worker", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        let result = {};
        try {
          result = await response.json();
        } catch {
          result = {};
        }

        if (!response.ok) {
          messageBox.style.display = "block";
          messageBox.className = "message-box error";
          messageBox.textContent = result.message || "Login error";
          return;
        }

        if (document.getElementById("rememberMe").checked) {
          localStorage.setItem("workerSavedEmail", data.email);
        } else {
          localStorage.removeItem("workerSavedEmail");
        }

        localStorage.setItem("workerFullName", result.fullName || "");
        localStorage.setItem("workerEmail", result.email || "");
        localStorage.setItem("workerRole", result.role || "Worker");
        localStorage.setItem("workerPhone", result.phone || "");
        localStorage.setItem("workerMunicipality", result.municipality || "");
        localStorage.setItem("workerDepartment", result.department || "");

        messageBox.style.display = "block";
        messageBox.className = "message-box success";
        messageBox.textContent = result.message || "Logged in successfully";

        setTimeout(() => {
          window.location.href = "../homepage/worker-home.html";
        }, 1000);

      } catch (error) {
        messageBox.style.display = "block";
        messageBox.className = "message-box error";
        messageBox.textContent = "Connection error with server";
        console.error(error);
      }
    });

    const savedEmail = localStorage.getItem("workerSavedEmail");

    if (savedEmail) {
      document.getElementById("email").value = savedEmail;
      document.getElementById("rememberMe").checked = true;
    }
  </script>
</body>
</html>
