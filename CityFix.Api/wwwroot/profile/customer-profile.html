<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פרופיל לקוח - CityFix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: #eef4ff;
      min-height: 100vh;
      padding: 30px 20px;
      color: #0f172a;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #2563eb;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
    }

    .card {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #4f46e5 0%, #2563eb 100%);
      color: white;
      padding: 28px 28px 36px;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.95;
    }

    .content {
      padding: 28px;
    }

    .avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -6px;
      margin-bottom: 24px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 10px;
    }

    .avatar svg {
      width: 54px;
      height: 54px;
      stroke: #2563eb;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .camera-btn {
      position: absolute;
      bottom: 2px;
      left: 2px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .avatar-note {
      font-size: 14px;
      color: #64748b;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 50px;
      border: 1px solid #d7dee8;
      border-radius: 12px;
      background: #fff;
      font-size: 16px;
      color: #0f172a;
      outline: none;
      padding: 0 14px 0 42px;
    }

    .input-wrap input::placeholder {
      color: #94a3b8;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      stroke: #94a3b8;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .divider {
      margin: 26px 0 20px;
      border: none;
      border-top: 1px solid #e2e8f0;
    }

    .section-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 16px;
      color: #0f172a;
    }

    .password-note {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      height: 52px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .save-btn {
      background: #2563eb;
      color: white;
    }

    .cancel-btn {
      background: #e5e7eb;
      color: #1f2937;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 28px;
      }

      .content {
        padding: 20px 16px 24px;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <a class="back-link" href="../homepage/customer-home.html">← חזרה לפרופיל</a>

  <div class="card">
    <div class="header">
      <h1>עריכת פרופיל</h1>
      <p>עדכן את הפרטים האישיים שלך</p>
    </div>

    <div class="content">
      <div class="avatar-wrap">
        <div class="avatar">
          <svg viewBox="0 0 24 24">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/>
            <path d="M4 20a8 8 0 0 1 16 0"/>
          </svg>
          <button class="camera-btn" type="button">📷</button>
        </div>
        <div class="avatar-note">לחץ להעלאת תמונת פרופיל</div>
      </div>

      <form id="profileForm">
        <div class="form-grid">
          <div class="form-group full">
            <label>שם מלא *</label>
            <div class="input-wrap">
              <input type="text" id="fullName" placeholder="הכנס שם מלא">
              <svg viewBox="0 0 24 24">
                <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/>
                <path d="M4 20a8 8 0 0 1 16 0"/>
              </svg>
            </div>
          </div>

          <div class="form-group full">
            <label>אימייל *</label>
            <div class="input-wrap">
              <input type="email" id="email" placeholder="name@example.com" readonly>
              <svg viewBox="0 0 24 24">
                <path d="M4 6h16v12H4z"/>
                <path d="m4 7 8 6 8-6"/>
              </svg>
            </div>
          </div>

          <div class="form-group full">
            <label>טלפון *</label>
            <div class="input-wrap">
              <input type="text" id="phone" placeholder="050-1234567">
              <svg viewBox="0 0 24 24">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.63 2.61a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.47-1.2a2 2 0 0 1 2.11-.45c.83.3 1.71.51 2.61.63A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
          </div>

          <div class="form-group full">
            <label>כתובת *</label>
            <div class="input-wrap">
              <input type="text" id="address" placeholder="הכנס כתובת">
              <svg viewBox="0 0 24 24">
                <path d="M12 21s-6-4.35-6-10a6 6 0 0 1 12 0c0 5.65-6 10-6 10Z"/>
                <circle cx="12" cy="11" r="2"/>
              </svg>
            </div>
          </div>
        </div>

        <hr class="divider">

        <div class="section-title">שינוי סיסמה (אופציונלי)</div>
        <div class="password-note">השאר ריק אם אינך רוצה לשנות סיסמה</div>

        <div class="form-grid">
          <div class="form-group full">
            <label>סיסמה נוכחית</label>
            <div class="input-wrap">
              <input type="password" id="currentPassword" placeholder="••••••••">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>סיסמה חדשה</label>
            <div class="input-wrap">
              <input type="password" id="newPassword" placeholder="••••••••">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>אימות סיסמה</label>
            <div class="input-wrap">
              <input type="password" id="confirmPassword" placeholder="••••••••">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
              </svg>
            </div>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn save-btn">שמור שינויים</button>
          <button type="button" class="btn cancel-btn" onclick="goBack()">ביטול</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    
  const fullName = localStorage.getItem("userFullName");
  const email = localStorage.getItem("userEmail");
  const phone = localStorage.getItem("userPhone");
const address = localStorage.getItem("userAddress");

document.getElementById("phone").value = phone || "";
document.getElementById("address").value = address || "";

  document.getElementById("fullName").value = fullName || "";
  document.getElementById("email").value = email || "";

  function goBack() {
    window.location.href = "../homepage/customer-home.html";
  }

  document.getElementById("profileForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const fullNameValue = document.getElementById("fullName").value.trim();
    const emailValue = document.getElementById("email").value.trim();
    const phoneValue = document.getElementById("phone").value.trim();
    const addressValue = document.getElementById("address").value.trim();
    const currentPasswordValue = document.getElementById("currentPassword").value;
    const newPasswordValue = document.getElementById("newPassword").value;
    const confirmPasswordValue = document.getElementById("confirmPassword").value;

    if (newPasswordValue && newPasswordValue !== confirmPasswordValue) {
      alert("אימות הסיסמה אינו תואם");
      return;
    }

    const data = {
      email: emailValue,
      fullName: fullNameValue,
      phone: phoneValue,
      address: addressValue,
      currentPassword: currentPasswordValue,
      newPassword: newPasswordValue
    };

    try {
      const response = await fetch("/api/Auth/update-customer-profile", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (!response.ok) {
        alert(result.message || "שגיאה בעדכון הפרופיל");
        return;
      }

      localStorage.setItem("userFullName", result.fullName || "");
      localStorage.setItem("userEmail", result.email || "");
      localStorage.setItem("userPhone", result.phone || "");
      localStorage.setItem("userAddress", result.address || "");

      alert(result.message || "הפרופיל עודכן בהצלחה");
      window.location.href = "../homepage/customer-home.html";
    } catch (error) {
      alert("שגיאה בחיבור לשרת");
      console.error(error);
    }
  });
</script>
</body>
</html>
