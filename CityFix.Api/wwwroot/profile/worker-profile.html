<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worker Profile - CityFix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: #eefbf3;
      min-height: 100vh;
      padding: 30px 20px;
      color: #0f172a;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #16a34a;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
    }

    .card {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
      color: white;
      padding: 28px 28px 36px;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.95;
    }

    .content {
      padding: 28px;
    }

    .avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #dcfce7;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 10px;
    }

    .avatar svg {
      width: 54px;
      height: 54px;
      stroke: #16a34a;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .camera-btn {
      position: absolute;
      bottom: 2px;
      left: 2px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: #16a34a;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .avatar-note {
      font-size: 14px;
      color: #64748b;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
            padding: 0px 60px ;

    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0f172a;
      padding: 0px 30px ;

    }

    .input-wrap {
      position: relative;
    }

   .input-wrap input,
.input-wrap select {
  width: 100%;
  height: 50px;
  border: 1px solid #d7dee8;
  border-radius: 12px;
  background: #fff;
  font-size: 16px;
  color: #0f172a;
  outline: none;
  padding: 0 14px 0 42px;
  appearance: none;
  
}

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      stroke: #94a3b8;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .input-wrap.password-wrap input {
      padding-right: 48px;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 9px;
      background: #f0fdf4;
      color: #16a34a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s ease;
      z-index: 3;
      
    }

    .password-toggle:hover {
      background: #16a34a;
      color: #ffffff;
      box-shadow: 0 6px 14px rgba(22, 163, 74, 0.22);
    }

    .password-toggle svg {
      position: static !important;
      left: auto !important;
      top: auto !important;
      transform: none !important;
      width: 17px !important;
      height: 17px !important;
      stroke: currentColor !important;
      fill: none !important;
      stroke-width: 2 !important;
      stroke-linecap: round !important;
      stroke-linejoin: round !important;
      pointer-events: none !important;
    }

    .divider {
      margin: 26px 0 20px;
      border: none;
      border-top: 1px solid #e2e8f0;
    }

    .section-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 16px;
      color: #0f172a;
      padding: 0px 60px ;

    }

    .password-note {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 14px;
      padding: 0px 60px ;

    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      height: 52px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .save-btn {
      background: #16a34a;
      color: white;
    }

    .cancel-btn {
      background: #e5e7eb;
      color: #1f2937;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 28px;
      }

      .content {
        padding: 20px 16px 24px;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <a class="back-link" href="../homepage/worker-home.html">← Back to Home</a>

  <div class="card">
    <div class="header">
      <h1>Edit Worker Profile</h1>
      <p>Update your personal details</p>
    </div>

    <div class="content">
      <div class="avatar-wrap">
        <div class="avatar">
          <svg viewBox="0 0 24 24">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/>
            <path d="M4 20a8 8 0 0 1 16 0"/>
          </svg>
          <button class="camera-btn" type="button">📷</button>
        </div>
        <div class="avatar-note">Click to upload profile picture</div>
      </div>

      <form id="workerProfileForm">
        <div class="form-grid">
          <div class="form-group full">
            <label>Full Name *</label>
            <div class="input-wrap">
              <input type="text" id="fullName" placeholder="Enter full name">
              <svg viewBox="0 0 24 24">
                <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/>
                <path d="M4 20a8 8 0 0 1 16 0"/>
              </svg>
            </div>
          </div>

          <div class="form-group full">
            <label>Email *</label>
            <div class="input-wrap">
              <input type="email" id="email" placeholder="name@example.com" readonly>
              <svg viewBox="0 0 24 24">
                <path d="M4 6h16v12H4z"/>
                <path d="m4 7 8 6 8-6"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>Phone *</label>
            <div class="input-wrap">
              <input type="text" id="phone" placeholder="050-1234567">
              <svg viewBox="0 0 24 24">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.63 2.61a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.47-1.2a2 2 0 0 1 2.11-.45c.83.3 1.71.51 2.61.63A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
          </div>

         <div class="form-group">
  <label>Municipality *</label>
  <div class="input-wrap">
    <select id="municipality" required>
      <option value="">Select Municipality</option>
    </select>
    <svg viewBox="0 0 24 24">
      <path d="M7 10l5 5 5-5"></path>
    </svg>
  </div>
</div>

          <div class="form-group full">
  <label>Department *</label>
  <div class="input-wrap">
    <select id="department">

    </select>
    
  </div>
</div>
          </div>
        </div>

        <hr class="divider">

        <div class="section-title">Change Password (Optional)</div>
        <div class="password-note">Leave empty if you don't want to change your password</div>

        <div class="form-grid">
          <div class="form-group full">
            <label>Current Password</label>
            <div class="input-wrap password-wrap">
              <input type="password" id="currentPassword" placeholder="••••••••">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
              </svg>

              <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
                <svg class="eye-open" viewBox="0 0 24 24">
                  <path d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>

                <svg class="eye-off" viewBox="0 0 24 24" style="display:none">
                  <path d="M17.94 17.94A10.8 10.8 0 0 1 12 19C5.5 19 1.5 12 1.5 12a19.1 19.1 0 0 1 5.06-5.94"></path>
                  <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42"></path>
                  <path d="M9.9 4.24A10.7 10.7 0 0 1 12 4.99c6.5 0 10.5 7 10.5 7a19.4 19.4 0 0 1-2.44 3.27"></path>
                  <path d="M3 3l18 18"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label>New Password</label>
            <div class="input-wrap password-wrap">
              <input type="password" id="newPassword" placeholder="••••••••">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
              </svg>

              <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
                <svg class="eye-open" viewBox="0 0 24 24">
                  <path d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>

                <svg class="eye-off" viewBox="0 0 24 24" style="display:none">
                  <path d="M17.94 17.94A10.8 10.8 0 0 1 12 19C5.5 19 1.5 12 1.5 12a19.1 19.1 0 0 1 5.06-5.94"></path>
                  <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42"></path>
                  <path d="M9.9 4.24A10.7 10.7 0 0 1 12 4.99c6.5 0 10.5 7 10.5 7a19.4 19.4 0 0 1-2.44 3.27"></path>
                  <path d="M3 3l18 18"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrap password-wrap">
              <input type="password" id="confirmPassword" placeholder="••••••••">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
              </svg>

              <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
                <svg class="eye-open" viewBox="0 0 24 24">
                  <path d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>

                <svg class="eye-off" viewBox="0 0 24 24" style="display:none">
                  <path d="M17.94 17.94A10.8 10.8 0 0 1 12 19C5.5 19 1.5 12 1.5 12a19.1 19.1 0 0 1 5.06-5.94"></path>
                  <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42"></path>
                  <path d="M9.9 4.24A10.7 10.7 0 0 1 12 4.99c6.5 0 10.5 7 10.5 7a19.4 19.4 0 0 1-2.44 3.27"></path>
                  <path d="M3 3l18 18"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn save-btn">Save Changes</button>
          <button type="button" class="btn cancel-btn" onclick="goBack()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
  

  <script>
  function togglePasswordVisibility(button) {
    const wrapper = button.closest(".input-wrap");
    if (!wrapper) return;

    const input = wrapper.querySelector("input");
    if (!input) return;

    const shouldShow = input.type === "password";
    input.type = shouldShow ? "text" : "password";

    const eyeOpen = button.querySelector(".eye-open");
    const eyeOff = button.querySelector(".eye-off");

    if (eyeOpen && eyeOff) {
      eyeOpen.style.display = shouldShow ? "none" : "block";
      eyeOff.style.display = shouldShow ? "block" : "none";
    }

    button.setAttribute(
      "aria-label",
      shouldShow ? "Hide password" : "Show password"
    );
  }

  const email = localStorage.getItem("workerEmail");

  const municipalities = [
    "אבו גוש","אבו סנאן","אבן יהודה","אום אל-פחם","אופקים","אור יהודה","אור עקיבא",
    "אילת","אלעד","אריאל","אשדוד","אשקלון","באקה אל-גרבייה","באר יעקב","באר שבע",
    "בית שאן","בית שמש","בני ברק","בת ים","גבעתיים","דימונה","הוד השרון","הרצליה",
    "חדרה","חולון","חיפה","טבריה","טירה","טירת כרמל","יבנה","יהוד-מונוסון",
    "יקנעם עילית","ירושלים","כפר יונה","כפר סבא","כרמיאל","לוד","מגדל העמק",
    "מודיעין-מכבים-רעות","מעלה אדומים","נהריה","נס ציונה","נצרת","נשר","נתיבות",
    "נתניה","עכו","עפולה","פתח תקווה","צפת","קריית אתא","קריית ביאליק","קריית גת",
    "קריית ים","קריית מוצקין","קריית מלאכי","קריית אונו","קריית שמונה","ראש העין",
    "ראשון לציון","רחובות","רמלה","רמת גן","רמת השרון","רעננה","שדרות","תל אביב-יפו"
  ];

  const departments = [
  "Roads",
  "Lighting",
  "Sanitation",
  "Gardening",
  "Water and Sewage",
  "Urban Inspection",
  "General Maintenance"
];

  const municipalitySelect = document.getElementById("municipality");
  municipalities
    .sort((a, b) => a.localeCompare(b))
    .forEach(name => {
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      municipalitySelect.appendChild(option);
    });

  const departmentSelect = document.getElementById("department");
  departments.forEach(dep => {
    const option = document.createElement("option");
    option.value = dep;
    option.textContent = dep;
    departmentSelect.appendChild(option);
  });

  async function loadWorkerProfile() {
    if (!email) {
      alert("Worker email not found");
      return;
    }

    try {
      const response = await fetch(`/api/Auth/worker-profile?email=${encodeURIComponent(email)}`);
      const result = await response.json();

      if (!response.ok) {
        alert(result.message || "Error loading worker details");
        return;
      }

      document.getElementById("fullName").value = result.fullName || "";
      document.getElementById("email").value = result.email || "";
      document.getElementById("phone").value = result.phone || "";

      document.getElementById("municipality").value = result.municipality || "";
      document.getElementById("department").value = result.department || "";

      localStorage.setItem("workerFullName", result.fullName || "");
      localStorage.setItem("workerEmail", result.email || "");
      localStorage.setItem("workerPhone", result.phone || "");
      localStorage.setItem("workerMunicipality", result.municipality || "");
      localStorage.setItem("workerDepartment", result.department || "");
      localStorage.setItem("workerRole", "Worker");

    } catch (error) {
      alert("Connection error with server");
      console.error(error);
    }
  }

  function goBack() {
    window.location.href = "../homepage/worker-home.html";
  }

  loadWorkerProfile();

  document.getElementById("workerProfileForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const fullNameValue = document.getElementById("fullName").value.trim();
    const emailValue = document.getElementById("email").value.trim();
    const phoneValue = document.getElementById("phone").value.trim();
    const municipalityValue = document.getElementById("municipality").value;
    const departmentValue = document.getElementById("department").value;
    const currentPasswordValue = document.getElementById("currentPassword").value;
    const newPasswordValue = document.getElementById("newPassword").value;
    const confirmPasswordValue = document.getElementById("confirmPassword").value;

    if (newPasswordValue && newPasswordValue !== confirmPasswordValue) {
      alert("Password confirmation does not match");
      return;
    }

    const data = {
      email: emailValue,
      fullName: fullNameValue,
      phone: phoneValue,
      municipality: municipalityValue,
      department: departmentValue,
      currentPassword: currentPasswordValue,
      newPassword: newPasswordValue
    };

    try {
      const response = await fetch("/api/Auth/update-worker-profile", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (!response.ok) {
        alert(result.message || "Error updating worker profile");
        return;
      }

      localStorage.setItem("workerFullName", result.fullName || "");
      localStorage.setItem("workerEmail", result.email || "");
      localStorage.setItem("workerPhone", result.phone || "");
      localStorage.setItem("workerMunicipality", result.municipality || "");
      localStorage.setItem("workerDepartment", result.department || "");

      alert(result.message || "Worker profile updated successfully");
      window.location.href = "../homepage/worker-home.html";

    } catch (error) {
      alert("Connection error with server");
      console.error(error);
    }
  });
</script>
</body>
</html>
