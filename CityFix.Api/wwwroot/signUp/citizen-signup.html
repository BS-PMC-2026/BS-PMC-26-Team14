<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citizen Sign Up - CityFix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(90deg, #eaf8fd 0%, #dff4fb 100%);
      min-height: 100vh;
      color: #0f172a;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 16px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.10);
      padding: 28px 26px 30px;
    }

    .top-icon {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 18px;
    }

    .top-icon svg {
      width: 42px;
      height: 42px;
      stroke: #2563eb;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      color: #475569;
      font-size: 18px;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 16px;
      margin-top: 10px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 48px;
      border: 1px solid #d7dee8;
      border-radius: 12px;
      background: #ffffff;
      font-size: 16px;
      color: #0f172a;
      outline: none;
      padding: 0 14px 0 42px;
    }

    .input-wrap input::placeholder {
      color: #94a3b8;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      stroke: #94a3b8;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .checkbox-row {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #334155;
      font-size: 15px;
      flex-wrap: wrap;
    }

    .checkbox-row input {
      width: 16px;
      height: 16px;
      accent-color: #2563eb;
    }

    .checkbox-row a {
      color: #2563eb;
      font-weight: 700;
      text-decoration: none;
    }

    .checkbox-row a:hover {
      text-decoration: underline;
    }

    .submit-btn {
      width: 100%;
      margin-top: 20px;
      height: 50px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
    }

    .submit-btn:hover {
      background: #1d4ed8;
    }

    .bottom-links {
      text-align: center;
      margin-top: 22px;
      line-height: 2;
    }

    .bottom-links a {
      text-decoration: none;
    }

    .login-link {
      color: #2563eb;
      font-weight: 700;
    }

    .back-link {
      color: #334155;
      font-size: 17px;
    }

    .success-box {
      display: none;
      margin-top: 20px;
      background: #eff6ff;
      border: 1px solid #93c5fd;
      color: #1d4ed8;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      line-height: 1.8;
      font-size: 16px;
      font-weight: 500;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 28px;
      }

      .subtitle {
        font-size: 16px;
      }

      .card {
        padding: 22px 16px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="top-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/>
          <path d="M4 20a8 8 0 0 1 16 0"/>
        </svg>
      </div>

      <h1 class="title">Citizen Sign Up</h1>
      <p class="subtitle">Create a new account and start reporting issues</p>

      <form id="citizenForm">
        <div class="form-grid">

          <div class="form-group">
            <label>Phone *</label>
            <div class="input-wrap">
              <input type="text" placeholder="050-1234567" required>
              <svg viewBox="0 0 24 24">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.63 2.62a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6.09 6.09l1.46-1.29a2 2 0 0 1 2.11-.45c.84.3 1.72.51 2.62.63A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>Full Name *</label>
            <div class="input-wrap">
              <input type="text" placeholder="John Smith" required>
              <svg viewBox="0 0 24 24">
                <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/>
                <path d="M4 20a8 8 0 0 1 16 0"/>
              </svg>
            </div>
          </div>

          <div class="form-group full">
            <label>Email *</label>
            <div class="input-wrap">
              <input type="email" placeholder="example@email.com" required>
              <svg viewBox="0 0 24 24">
                <path d="M4 6h16v12H4z"/>
                <path d="m4 7 8 6 8-6"/>
              </svg>
            </div>
          </div>

          <div class="form-group full">
            <label>Address *</label>
            <div class="input-wrap">
              <input type="text" placeholder="123 Main St, City" required>
              <svg viewBox="0 0 24 24">
                <path d="M12 21s-6-4.35-6-10a6 6 0 1 1 12 0c0 5.65-6 10-6 10Z"/>
                <circle cx="12" cy="11" r="2"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password *</label>
            <div class="input-wrap">
              <input type="password" placeholder="••••••••" required>
              <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"/>
                <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>Password *</label>
            <div class="input-wrap">
              <input type="password" placeholder="••••••••" required>
              <svg viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2"/>
                <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
              </svg>
            </div>
          </div>

        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="agree" required>
          <label for="agree">
            I agree to the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="submit-btn">Sign Up Now</button>

        <div class="success-box" id="successBox">
          Registration successful.
          Your account has been created and you can start using the system.
        </div>
      </form>

      <div class="bottom-links">
        <div>Already have an account? <a class="login-link" href="/CityFix.Api/wwwroot/LogIn/login.html">Login</a></div>
        <div><a class="back-link" href="signup-choice.html">← Back to Sign Up Choice</a></div>
      </div>
    </div>
  </div>

<script>
  const form = document.getElementById("citizenForm");
  const successBox = document.getElementById("successBox");

  form.addEventListener("submit", async function (event) {
    event.preventDefault();

    const inputs = form.querySelectorAll("input");

    const data = {
      phone: inputs[0].value,
      fullName: inputs[1].value,
      email: inputs[2].value,
      address: inputs[3].value,
      password: inputs[5].value
    };

    try {
      const response = await fetch("/api/auth/register-customer", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (response.ok) {
        successBox.style.display = "block";
        successBox.innerText = result.message;
window.location.href = "/LogIn/customer-login.html";
      } else {
        alert(result.message || "Registration error");
      }
    } catch (error) {
      alert("Connection error with server");
      console.error(error);
    }
  });
</script>
</body>
</html>
